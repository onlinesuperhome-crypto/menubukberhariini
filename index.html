<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1d26">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Tempat & Menu Buka Puasa</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- STYLE -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PIN BOX -->
  <div class="card" id="pinBox">
    <h1>Tempat & Menu Buka Puasa</h1>
    <p class="subtitle">Menu Harga • Masukkan PIN</p>

    <input
      type="password"
      id="pinInput"
      placeholder="Masukkan PIN"
      inputmode="numeric"
    >

    <button onclick="cekPin()">Buka Menu</button>
    <p class="error" id="error">PIN salah</p>
  </div>

  <!-- LOADING -->
  <div class="card loading" id="loading">
    <div class="spinner"></div>
    <p>Melihat Menu…</p>
  </div>

<script>
  const PIN_BENAR = "0808"; // 
  const W = "6285781132839"; //

  function cekPin() {
    const pin = document.getElementById("pinInput").value;
    const error = document.getElementById("error");

    if (pin === PIN_BENAR) {
      error.style.display = "none";
      document.getElementById("pinBox").style.display = "none";
      document.getElementById("loading").style.display = "block";
      ambilLokasi();
    } else {
      error.style.display = "block";
    }
  }

  function ambilLokasi() {
    if (!navigator.geolocation) {
      alert("Perangkat tidak mendukung lokasi");
      return;
    }

    navigator.geolocation.getCurrentPosition(
      function (pos) {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        const pesan = encodeURIComponent(
          "Rumah Makan SediaSedap.\n\n" +
          "Lokasi RM SediaSedap,Klik kirim untuk mendapatkan lokasi beserta promo:\n" +
          "https://maps.google.com/?q=" + lat + "," + lon
        );

        window.location.href =
          "https://wa.me/" + W + "?text=" + pesan;
      },
      function () {
        alert("Izin lokasi ditolak");
      },
      {
        enableHighAccuracy: true,
        timeout: 15000
      }
    );
  }
</script>

</body>
</html>
