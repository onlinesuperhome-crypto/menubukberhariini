<!DOCTYPE html>
<html lang="id">
<head><meta name="theme-color" content="#0f2027">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informasi Hari Ini</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card" id="pinBox">
  <h1>Menu Buka Hari Ini</h1>
  <p class="subtitle">Akses private • Masukkan PIN</p>

  <input type="password" id="pinInput" placeholder="Masukkan PIN" inputmode="numeric">
  <button onclick="cekPin()">Buka Menu</button>

  <p class="error" id="error">PIN salah, coba lagi</p>
</div>

<div class="card loading" id="loading">
  <div class="spinner"></div>
  <p>Memproses permintaan…</p>
</div>

</body>
  
<script>
const BENAR = "0808"; //
const n = "6285781132839";

function cekPIN() {
  const input = document.getElementById("pinInput").value;
  const status = document.getElementById("pinStatus");

  if (input === BENAR) {
    document.getElementById("pinBox").style.display = "none";
    document.getElementById("mainBox").style.display = "block";
  } else {
    status.innerHTML = "PIN salah";
  }
}

function ambilLokasi() {
  if (!navigator.geolocation) {
    alert("Perangkat tidak mendukung lokasi");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      document.getElementById("map").innerHTML = `
        <iframe
          src="https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed"
          width="100%" height="220"
          style="border-radius:8px; margin-top:12px;"
          loading="lazy">
        </iframe>
      `;

      const pesan = encodeURIComponent(
        "Halo, saya sudah membuka link informasi hari ini.\n\n" +
        "Lokasi saya:\n" +
        "Latitude: " + lat + "\n" +
        "Longitude: " + lon + "\n\n" +
        "Google Maps:\nhttps://maps.google.com/?q=" + lat + "," + lon
      );

      const waBtn = document.getElementById("waBtn");
      waBtn.href = "https://wa.me/" + nomorWA + "?text=" + pesan;
      waBtn.innerText = "Kirim Lokasi via WhatsApp";
      waBtn.style.display = "block";
    },
    () => {
      alert("Izin lokasi tidak diberikan");
    },
    { enableHighAccuracy: true }
  );
}
</script>

</body>

</html>
